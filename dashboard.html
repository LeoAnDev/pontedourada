<!-- dashboard.html - Painel Administrativo Centralizado -->
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponte Dourada | Dashboard - GEC</title>
    <!-- Font Awesome para os novos ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" sizes="32x32" href="images/Logotipos/PonteDourada.png">
    <link rel="stylesheet" href="css/admin.css">
    <script src="js/admin.js"></script>
</head>

<body>
    <div class="admin-container">

        <!-- Painel Centralizado -->
        <main class="main-content">
            <header class="topbar">
                <h1>TELA PRINCIPAL - GEC (Gerenciamento e Controle)</h1>
            </header>

            <div class="content">
                <!-- Banner de Boas-vindas -->
                <div class="welcome-banner">
                    <p>Setor Administrativo: Gestor</p>
                </div>

                <!-- Tab de Imagem -->
                <div class="image-banner-tab">
                    <img src="images/Logotipos/1.png" alt="Banner Informativo">
                </div>

                <!-- Menu Grid com Ícones Sugestivos -->
                <div class="card">
                    <div class="card-body">
                        <div class="menu-grid">

                            <a href="produtos.html" class="menu-item">
                                <div class="icon-box produtos">
                                    <img src="images/PNG/32px/059-cart.png" alt="Produtos">
                                </div>
                                <span>Produtos</span>
                            </a>

                            <a href="servicos.html" class="menu-item">
                                <div class="icon-box servicos">
                                    <img src="images/PNG/32px/146-wrench.png" alt="Produtos">
                                </div>
                                <span>Serviços</span>
                            </a>

                            <a href="agendamentos.html" class="menu-item">
                                <div class="icon-box agendamentos">
                                    <img src="images/PNG/32px/084-calendar.png" alt="Produtos">
                                </div>
                                <span>Agendamentos</span>
                            </a>

                            <a href="fornecedores.html" class="menu-item">
                                <div class="icon-box fornecedores">
                                    <img src="images/PNG/32px/095-box-add.png" alt="Produtos">
                                </div>
                                <span>Fornecedores</span>
                            </a>

                            <a href="profissionais.html" class="menu-item">
                                <div class="icon-box profissionais">
                                    <img src="images/PNG/32px/119-user-tie.png" alt="Produtos">
                                </div>
                                <span>Profissionais</span>
                            </a>

                            <a href="clientes.html" class="menu-item">
                                <div class="icon-box clientes">
                                    <img src="images/PNG/32px/186-list-numbered.png" alt="Produtos">
                                </div>
                                <span>Clientes</span>
                            </a>

                        </div>
                    </div>
                </div>
            </div>
            <footer>
                <a href="index.html" class="btn-logoff">
                    <i class="fas fa-power-off"></i>
                    <span>Sair</span>
                </a>
            </footer>
        </main>
    </div>
</body>

</html>
